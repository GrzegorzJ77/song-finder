<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Song Finder</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="logo">🎵 Song Finder</div>
<button id="loginBtn">Zaloguj się do Spotify</button>
</header>

<main class="container">

<div class="search-box">
<input id="searchInput" type="text" placeholder="Powiedz lub wpisz nazwę piosenki...">
<button id="searchBtn">Szukaj</button>
<button id="voiceBtn">🎤</button>
</div>

<h2>Wyniki</h2>
<div id="results" class="results"></div>

<div id="videoSection" class="video-section"></div>

</main>

<script src="script.js"></script>

</body>
</html>
